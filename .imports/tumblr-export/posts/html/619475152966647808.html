                                    <h1>Khó Hiểu Thế Nhỉ</h1>
                    <p>Những gì tôi viết đương nhiên là khó hiểu<br/>Thậm chí không ai có thể hiểu nổi<br/>Nếu bạn có một cuốn nhật ký<br/>Bạn có muốn ai cũng đọc được hay không?<br/><br/>Tôi không viết để bán<br/>Tôi viết là cho tôi</p>
