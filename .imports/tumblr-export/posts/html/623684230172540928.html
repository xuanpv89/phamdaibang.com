                                    <h1>Nàng Thơ</h1>
                    <p><i>Nàng thơ ạ,<br/>Có những ngày em như một con Quạ màu Đen<br/>Nếu những kẻ say mê em bởi vì sắc đẹp<br/>Liệu chúng có yêu em mỗi khi lúc này?<br/>Những khi ấy người đẹp cũng chẳng để làm gì!</i></p>
