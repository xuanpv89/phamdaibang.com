                                    <h1>Hạt Nầm Nở Chiếc Lá</h1>
                    <p>Có hạt khô nằm chết<br/>Bên bờ rào không tên<br/>Ngày hôm sau chỗ ấy<br/>Chắc là hoa mọc lên<br/><br/>Có nhành hoa nằm chết<br/>Bên bờ rào không tên<br/>Ngày hôm sau chỗ ấy<br/>Có hạt mầm mọc lên<br/><br/><b><i>(4 Câu đầu của <a href="https://www.instagram.com/baohang.official/" target="_blank">Bảo Hằng</a>)</i></b></p>
