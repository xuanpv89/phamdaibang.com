                                    <h1>Hà Nội Những Năm 2030</h1>
                    <p>Khi tôi không biết làm gì<br/>Những ánh đèn nhấp nháy<br/>Giữa buổi chiều trời mưa<br/>Tiếng quạt máy ù u<br/>Tôi nằm ngồi thu lu</p><p>Chẳng còn điều gì quan trọng<br/>Có mỗi món dưa muối là ngon</p>
