                                    <h1>Hạt Mầm Nở Chiếc Lá</h1>
                    <p>

<b>Hạt Mầm Nở Chiếc Lá<br/></b><br/>Một thân cây gỗ mục rơi rớt một hạt mầm<br/>Nước thấm thân âm thầm thổi một luồng hơi ấm<br/>Thân gỗ mục nảy mầm nở thành một nhành cây<br/>Em cầm một chiếc lá đi về tận nơi xa<br/>Tôi về cõi ta bà thế là mình đi xa

<br/></p>
