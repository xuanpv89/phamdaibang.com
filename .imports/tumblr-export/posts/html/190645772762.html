                                    <h1>Bài Ca Không Lời Em Hát</h1>
                    <p>

<b>Bài Ca Không Lời Em Hát<br/></b><br/>Trời xanh mây trắng em lòng khuôn trăng<br/>Tôi buồn đằng đặng em giờ ra răng?<br/>Góc cây gió hát tôi buồn bàn bạt<br/>Tâm hồn lơ lửng em ngồi dưng dưng<br/>Cành cây xơ xác gió bạt mưa xa<br/>Em ngồi em hát khúc ca không lời

<br/></p>
