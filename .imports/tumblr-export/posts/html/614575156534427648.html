                                    <h1>Mấy con kiến bị điên</h1>
                    <p><i>Có một con kiến nhỏ<br/>Trong giọt nước thật to<br/>Nó nằm ngủ ò o<br/>Rồi nó ngáy khò khò<br/>Trông giống một con bò<br/>To trong thế giới nhỏ<br/>Em nằm trên bãi cỏ<br/>Ôm một cái thật lo</i></p>
