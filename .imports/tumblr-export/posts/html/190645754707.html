                                    <h1>Con Mèo Mười Năm</h1>
                    <p>

<b>Con Mèo Mười Năm<br/></b><br/>Em như một con mèo trèo lưng tôi đi vắng<br/>Em về nằm trong nắng nhìn tôi về đăm đăm<br/>Tôi về lòng thăm thẳm nhìn một quãng mười năm<br/>Em vẫn là con mèo ôm eo tôi nằm ngủ<br/>Tôi đi về ủ rũ em nằm ngủ ù u

<br/></p>
