                                    <h1>Thổi Mất Mộc Cuộc Tình</h1>
                    <p><b>Thổi Mất Mộc Cuộc Tình</b><br/></p><p>Hơi lạnh từ đâu đến thổi qua một mối tình<br/>Hai người yêu lặng thinh trôi mất một cuộc tình<br/>Bàn tay chưa kịp ấm lối đi còn chưa quen<br/>Nhịp tim chưa chung lối cuộc tình đã mồ côi</p>
