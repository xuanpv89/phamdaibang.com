                    <h1>Giấc mơ</h1><p>Một giấc mơ, vài câu chuyện<br/>Vài đứa trẻ, một chuyện hẹn hò<br/>Mấy tán cây, một bầu trời<br/>Cuốn tiểu thuyết, và những lời ru</p><p>Tất cả, tan theo giọt nước mắt<br/>Nơi hàng mi cong ướt lệ thêm cong<br/>Anh chưa kịp ngỏ giấc mơ<br/>Gạt nước mắt, em nói<br/>&ldquo;Mình chia tay&rdquo;</p>
