                                    <h1>Tiếng còi tàu đêm</h1>
                    <p>Một tiếng còi tàu đêm<br/>Một truyện ngắn dang dở<br/>Một nỗi nhớ không tên<br/>&ndash;</p><p>Những tiếng mở bia<br/>Bài ca về tiệm cận<br/>Nhớ một người tôi yêu<br/>Đánh mất một phần đời<br/>Vì những quãng buông lơi<br/></p>
