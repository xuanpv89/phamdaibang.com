                                    <h1>Em Bé Mồ Côi</h1>
                    <p><i><b>Một em bé mồ côi ngồi bên một đống lửa<br/>Chữa lành sự mồ côi rồi ngồi yên nghe lắng<br/>Tôi ngồi bên phiến đá vá víu một hình hài<br/>Giá tôi có đống lửa tôi muốn mình mồ côi

<br/></b></i></p><figure class="tmblr-full" data-orig-height="1200" data-orig-width="939"><img src="https://64.media.tumblr.com/c508366d15440a3245409a524c37158e/d033bf7e06e3a973-0f/s540x810/ee9b6e9a0ec91743df73e8e1aa1e0fa7ad41b39f.jpg" data-orig-height="1200" data-orig-width="939"/></figure><p>Tranh:
