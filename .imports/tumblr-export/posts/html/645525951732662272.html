                                    <h1></h1>
                    <p>Dưới bầu trời rực đỏ<br/>Có chú chim tự do<br/>Đi về miền đất nhỏ<br/>Xây hạnh phúc thật to<br/><br/>Nơi rừng xanh bát ngát<br/>Lác đác chú ve sầu<br/>Mượn lời ca tiếng hát<br/>Khao khát khúc tình si<br/><br/><i>(Đoạn sau của một bạn &lsquo;không biết tên&rsquo; gửi :D)</i></p>
