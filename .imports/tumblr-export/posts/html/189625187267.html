                                    <h1>Nhành ngọc lan bên cửa</h1>
                    <p>

Những ô cửa màu xanh<br/>Nhành ngọc lan len lén<br/>Một chú chim đầu cành<br/>Cắp sợi len làm tổ<br/>Cành lung lay nhè nhẹ<br/>Nhành ngọc lan rơi xuống<br/>Mùi hương len cánh cửa<br/>Tôi ngày buồn thành xanh

<br/></p>
