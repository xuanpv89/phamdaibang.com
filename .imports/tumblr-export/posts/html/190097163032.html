                                    <h1>Hoa Giấy</h1>
                    <p>

Giấy là cây nhưng giấy không là giấy<br/>Hương đi với hoa nhưng hoa không có hương<br/>Rặng cát ba màu cam đỏ trắng<br/>Hoa gì khô hạn hoa càng hoa<br/>Gió bạt cát mù xa mất lối<br/>Nắng gắt xương rồng xương đặng xương</p><figure class="tmblr-full" data-orig-height="2480" data-orig-width="3602"><img src="https://64.media.tumblr.com/02065a10afaaa98fac50e177be247b98/030940ce165fb9e3-76/s540x810/e1223da7009c921b419bffeded3614fef0119198.jpg" data-orig-height="2480" data-orig-width="3602"/></figure>
